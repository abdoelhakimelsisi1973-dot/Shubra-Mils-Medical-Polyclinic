<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة مجمع شبراملس</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7f6; direction: rtl; padding: 20px; }
        .main-layout { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: 250px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dashboard { flex: 1; background: white; padding: 20px; border-radius: 15px; }
        .day-btn, .clinic-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: 1px solid #0097a7; background: #fff; color: #0097a7; border-radius: 5px; font-weight: bold; }
        .day-btn.active, .clinic-btn.active { background: #0097a7; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #0097a7; color: white; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="sidebar">
        <h3>📅 الأيام</h3>
        <div id="daysList"></div>
        <hr>
        <div id="clinicsSection" style="display:none;">
            <h3>🏥 العيادات</h3>
            <div id="clinicsList"></div>
        </div>
    </div>

    <div class="dashboard">
        <h2 style="text-align:center; color:#0097a7;">لوحة تحكم مجمع شبراملس</h2>
        <p id="displayDate" style="text-align:center; font-weight:bold;"></p>
        <div id="status" style="text-align:center; color: orange;"></div>
        <table>
            <thead>
                <tr>
                    <th>الدور</th>
                    <th>اسم المريض</th>
                    <th>العيادة</th>
                    <th>الطبيب</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4">اختر اليوم والعيادة من القائمة اليمنى</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCghSGMQpRKBBWEvPsv50S0--bLr8mLTc",
        authDomain: "shubra-mils-clinic.firebaseapp.com",
        projectId: "shubra-mils-clinic",
        storageBucket: "shubra-mils-clinic.firebasestorage.app",
        messagingSenderId: "458397109437",
        appId: "1:458397109437:web:f8987863f32e1dbdbc3bd4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('displayDate').innerText = new Date().toLocaleDateString('ar-EG', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

    const schedule = {
        "السبت": ["أسنان", "مسالك بولية", "أنف وأذن وحنجرة", "عيون"],
        "الأحد": ["قلب وأوعية", "أنف وأذن وحنجرة", "أسنان", "عيون", "مسالك بولية", "عظام"],
        "الإثنين": ["نساء وتوليد", "جراحة مخ وأعصاب", "أسنان", "مسالك بولية"],
        "الثلاثاء": ["أنف وأذن وحنجرة", "نفسية وعصبية", "أسنان", "مسالك بولية", "عظام", "عيون"],
        "الأربعاء": ["أسنان", "قلب وأوعية", "مسالك بولية", "أطفال وحديثي الولادة"],
        "الخميس": ["قلب وأوعية", "أنف وأذن وحنجرة", "أسنان", "مسالك بولية", "عظام", "عيون"],
        "الجمعة": ["باطنة ومناظير"]
    };

    const daysList = document.getElementById('daysList');
    Object.keys(schedule).forEach(day => {
        const btn = document.createElement('button');
        btn.innerText = day;
        btn.className = 'day-btn';
        btn.onclick = () => showClinics(day, btn);
        daysList.appendChild(btn);
    });

    let currentDay = "";

    function showClinics(day, btn) {
        currentDay = day;
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const clinicsSection = document.getElementById('clinicsSection');
        const clinicsList = document.getElementById('clinicsList');
        clinicsList.innerHTML = "";
        clinicsSection.style.display = "block";

        schedule[day].forEach(clinic => {
            const cBtn = document.createElement('button');
            cBtn.innerText = clinic;
            cBtn.className = 'clinic-btn';
            cBtn.onclick = () => loadData(day, clinic, cBtn);
            clinicsList.appendChild(cBtn);
        });
    }

    async function loadData(day, clinic, btn) {
        document.querySelectorAll('.clinic-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const tbody = document.getElementById('tableBody');
        const status = document.getElementById('status');
        tbody.innerHTML = "<tr><td colspan='4'>جاري جلب البيانات...</td></tr>";
        
        try {
            const q = query(collection(db, "bookings"), where("bookingDay", "==", day));
            const querySnapshot = await getDocs(q);
            
            tbody.innerHTML = "";
            let count = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                // فلترة العيادة برمجياً لضمان المرونة
                if (data.specialty && data.specialty.includes(clinic)) {
                    count++;
                    tbody.innerHTML += `
                        <tr>
                            <td>${data.orderNumber || count}</td>
                            <td>${data.patientName}</td>
                            <td>${data.specialty}</td>
                            <td>${data.doctorName || '-'}</td>
                        </tr>
                    `;
                }
            });

            if (count === 0) {
                tbody.innerHTML = "<tr><td colspan='4'>لا توجد حجوزات مسجلة لهذه العيادة في هذا اليوم</td></tr>";
            }
        } catch (error) {
            console.error(error);
            tbody.innerHTML = "<tr><td colspan='4' style='color:red'>خطأ في الاتصال: تأكد من وجود بيانات في Firestore</td></tr>";
        }
    }
</script>
</body>
</html>
