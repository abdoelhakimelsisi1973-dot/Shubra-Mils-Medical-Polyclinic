<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مجمع شبراملس الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0097a7;
            --accent-color: #00bcd4;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--primary-color); padding-bottom: 20px; }
        h1 { color: var(--primary-color); margin: 0; font-size: 28px; }

        .filters { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; background: #e0f2f1; padding: 20px; border-radius: 15px; }
        select, button { padding: 12px 20px; border-radius: 12px; border: 2px solid #b2dfdb; font-family: 'Tajawal'; font-size: 16px; font-weight: bold; }
        
        .refresh-btn { background: var(--primary-color); color: white; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .refresh-btn:hover { background: var(--accent-color); transform: translateY(-2px); }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 18px; text-align: right; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; font-size: 17px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f8f9; }
        
        .order-badge { background: #0097a7; color: white; padding: 5px 12px; border-radius: 8px; font-weight: 800; }
        #loader { text-align: center; display: none; padding: 20px; font-size: 18px; color: var(--primary-color); font-weight: bold; }
        
        @media (max-width: 768px) {
            .filters { flex-direction: column; }
            th, td { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>📊 إدارة حجوزات مجمع شبراملس</h1>
        <p style="color: #668; font-weight: bold;">متابعة المواعيد المباشرة من Google Sheets</p>
    </header>

    <div class="filters">
        <select id="filterDay">
            <option value="">📅 كل الأيام</option>
            <option value="السبت">السبت</option>
            <option value="الأحد">الأحد</option>
            <option value="الإثنين">الإثنين</option>
            <option value="الثلاثاء">الثلاثاء</option>
            <option value="الأربعاء">الأربعاء</option>
            <option value="الخميس">الخميس</option>
            <option value="الجمعة">الجمعة</option>
        </select>

        <select id="filterSpecialty">
            <option value="">🏥 كل العيادات</option>
            <option value="أسنان">أسنان</option>
            <option value="عظام">عظام</option>
            <option value="قلب">قلب</option>
            <option value="عيون">عيون</option>
            <option value="مخ وأعصاب">مخ وأعصاب</option>
            <option value="باطنة">باطنة</option>
            <option value="أنف وأذن">أنف وأذن</option>
        </select>

        <button class="refresh-btn" onclick="fetchSheetData()">تحديث القائمة 🔄</button>
    </div>

    <div id="loader">🔄 جاري سحب البيانات من السحابة...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>رقم الدور</th>
                    <th>اسم المريض</th>
                    <th>العيادة</th>
                    <th>الطبيب المعالج</th>
                    <th>وقت التسجيل</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // رابط جوجل شيت (CSV)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbnDZjQKUzZQBjvc3b1jD8Jzy8Ndeif51RWrLohsmnKZVEmJrGxSqXS0Q8FlTb5y-M6vHuScw_vlTv/pub?output=csv";

    async function fetchSheetData() {
        const tbody = document.getElementById('tableBody');
        const loader = document.getElementById('loader');
        const dayFilter = document.getElementById('filterDay').value;
        const specFilter = document.getElementById('filterSpecialty').value;

        loader.style.display = 'block';
        tbody.innerHTML = '';

        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            
            // تحويل الـ CSV لصفوف ومسح العناوين
            const rows = text.split('\n').slice(1);
            let matchCount = 0;

            rows.forEach(row => {
                // تقسيم البيانات مع تنظيف الفراغات
                const cols = row.split(',').map(c => c.trim());
                if (cols.length < 2) return;

                const time      = cols[0]; // الطابع الزمني
                const pName     = cols[1]; // اسم المريض
                const specialty = cols[2]; // التخصص
                const doctor    = cols[3] || '-'; // الطبيب
                const orderNo   = cols[4] || '-'; // رقم الدور

                // تحديد اليوم من التاريخ في العمود الأول
                let rowDay = "";
                if (time) {
                    const parts = time.split(' ')[0].split('/');
                    const dateObj = new Date(parts[2], parts[0] - 1, parts[1]);
                    const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
                    rowDay = days[dateObj.getDay()];
                }

                // فلترة البيانات
                const dayMatch = !dayFilter || rowDay === dayFilter;
                const specMatch = !specFilter || specialty.includes(specFilter);

                if (dayMatch && specMatch) {
                    matchCount++;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="order-badge">${orderNo}</span></td>
                        <td><b>${pName}</b></td>
                        <td>${specialty}</td>
                        <td>${doctor}</td>
                        <td style="color: #666; font-size: 13px;">${time.split(' ')[1] || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                }
            });

            if (matchCount === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; padding: 40px;'>لا توجد حجوزات مسجلة لهذه الاختيارات حالياً</td></tr>";
            }

        } catch (err) {
            console.error(err);
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:red;'>⚠️ فشل جلب البيانات.. تأكد من اتصال الإنترنت أو إعدادات الملف</td></tr>";
        } finally {
            loader.style.display = 'none';
        }
    }

    // تشغيل الجلب تلقائياً عند فتح الصفحة
    window.onload = fetchSheetData;
</script>

</body>
</html>
