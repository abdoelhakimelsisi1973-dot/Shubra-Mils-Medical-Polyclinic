<script type="module">
    // 1. استيراد مكتبات فايربيس
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. إعدادات مشروعك (الخاصة بـ shubra-mils-clinic)
    const firebaseConfig = {
        apiKey: "AIzaSyCghSGMQpRKBBWEvPsv50S0--bLr8mLTc",
        authDomain: "shubra-mils-clinic.firebaseapp.com",
        projectId: "shubra-mils-clinic",
        storageBucket: "shubra-mils-clinic.firebasestorage.app",
        messagingSenderId: "458397109437",
        appId: "1:458397109437:web:f8987863f32e1dbdbc3bd4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- بيانات الأطباء (كما هي في كودك المظبوط) ---
    const constantServices = { 
        "طوارئ 24 ساعة": ["طبيب الطوارئ المناوب"], 
        "معمل التحاليل": ["د. ثريا القاضي", "د. فريال محمود رزق"] 
    };

    const scheduleData = {
        "السبت": { "أسنان": ["د. رنا حمودة (04:00 عصراً)", "د. خالد الداهس (09:00 مساءً)"], "مسالك": ["د. علي منتصر (07:00 مساءً)"], "أنف وأذن": ["د. محمد هيكل (07:00 مساءً)"], "عيون": ["أخصائي محمد مجدي سعده (02:00 ظهراً)"] },
        "الأحد": { "قلب": ["د. أحمد مسعد الغلبان (06:00 مساءً)"], "أسنان": ["د. محمد علاء (03:00 مساءً)", "د. محمود دهب (08:00 مساءً)"], "عيون": ["أخصائي د. خالد الشيخ (05:00 عصراً)"], "عظام": ["أخصائي إبراهيم مطاوع (04:00 عصراً)"] },
        "الإثنين": { "نساء": ["د. هيام السمراوي (01:00 ظهراً)"], "مخ وأعصاب": ["د. محمد سلام (08:00 مساءً)"], "أسنان": ["د. رنا حمودة", "د. خالد الداهس"], "مسالك": ["د. علي منتصر"] },
        "الثلاثاء": { "نفسية": ["د. آلاء الحوت (06:00 مساءً)"], "أسنان": ["د. محمد علاء", "د. محمود دهب"], "عظام": ["أخصائي إبراهيم مطاوع"], "عيون": ["أخصائي محمد مجدي سعده"] },
        "الأربعاء": { "أسنان": ["د. رنا حمودة", "د. خالد الداهس"], "قلب": ["د. أحمد مسعد الغلبان"], "اطفال": ["د. جينا عبدالله الشافعي (06:00 مساءً)"] },
        "الخميس": { "قلب": ["د. أحمد مسعد الغلبان"], "أنف وأذن": ["د. محمد هيكل"], "عظام": ["أخصائي إبراهيم مطاوع"], "عيون": ["أخصائي محمد مجدي سعده"] },
        "الجمعة": { "باطنة ومناظير": ["د. عزيز بدير (02:00 ظهراً)"] }
    };

    // جعل الوظائف متاحة عالمياً
    window.updateSpecialties = function() {
        const day = document.getElementById('bDay').value;
        const specSelect = document.getElementById('specialty');
        specSelect.innerHTML = '<option value="">اختر العيادة...</option>';
        if(day) {
            Object.keys(constantServices).forEach(s => specSelect.add(new Option(s, s)));
            if(scheduleData[day]) Object.keys(scheduleData[day]).forEach(s => specSelect.add(new Option(s, s)));
        }
    };

    window.updateDoctors = function() {
        const day = document.getElementById('bDay').value;
        const spec = document.getElementById('specialty').value;
        const docSelect = document.getElementById('doctorName');
        docSelect.innerHTML = '<option value="">اختر الطبيب...</option>';
        let list = constantServices[spec] || (scheduleData[day] ? scheduleData[day][spec] : null);
        if(list) list.forEach(d => docSelect.add(new Option(d, d)));
    };

    window.resetKimoForm = function() {
        if(confirm("هل تريد بالتأكيد مسح كافة البيانات المدخلة؟")) {
            document.getElementById('booking-form').reset();
            document.getElementById('specialty').innerHTML = '<option value="">يرجى اختيار اليوم أولاً...</option>';
            document.getElementById('doctorName').innerHTML = '<option value="">يرجى اختيار العيادة أولاً...</option>';
        }
    };

    // --- معالجة الحجز والإرسال لـ Firebase ---
    const form = document.getElementById('booking-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const pName = document.getElementById('pName').value;
        const bDay = document.getElementById('bDay').value;
        const doctor = document.getElementById('doctorName').value;
        const spec = document.getElementById('specialty').value;

        try {
            // 1. حساب رقم الدور (بناءً على عدد الحجوزات الموجودة)
            const q = query(collection(db, "bookings"));
            const querySnapshot = await getDocs(q);
            const count = querySnapshot.size + 1;

            // 2. إرسال البيانات لـ Firebase Firestore
            await addDoc(collection(db, "bookings"), {
                patientName: pName,
                bookingDay: bDay,
                specialty: spec,
                doctorName: doctor,
                orderNumber: count,
                timestamp: serverTimestamp()
            });

            // 3. عرض رسالة النجاح
            document.getElementById('loader').style.display = 'none';
            form.style.display = 'none';
            
            document.getElementById('res-name').innerText = pName;
            document.getElementById('res-day').innerText = bDay;
            document.getElementById('res-doc').innerText = doctor;
            document.getElementById('b-num').innerText = count;
            document.getElementById('success-msg').style.display = 'block';

            // 4. إرسال للواتساب
            const msg = `*حجز جديد*📝%0A*المريض:* ${pName}%0A*اليوم:* ${bDay}%0A*العيادة:* ${spec}%0A*الدكتور:* ${doctor}%0A*رقم الدور:* ${count}`;
            setTimeout(() => { window.location.href = `https://wa.me/201122501159?text=${msg}`; }, 1000);

        } catch (error) {
            console.error("Error adding document: ", error);
            alert('حدث خطأ أثناء الربط مع فايربيس! تأكد من إعدادات Firestore.');
            document.getElementById('btn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
