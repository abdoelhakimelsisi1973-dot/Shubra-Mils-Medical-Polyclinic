<script>
// (الأكواد البرمجية الخلفية كما هي بدون أي تغيير)
const constantServices = {
    "طوارئ 24 ساعة": ["طبيب الطوارئ المناوب"],
    "معمل التحاليل": ["أخصائي التحاليل (خدمة 24 ساعة)"]
};

const scheduleData = {
    "السبت": { "أسنان": ["د. رنا حمودة (4م)", "د. خالد الداهس (9م)"], "مسالك": ["د. علي منتصر (7م)"], "أنف وأذن": ["د. محمد هيكل (7م)"], "رمد": ["محمد مجدي سعده (2ظ)"] },
    "الأحد": { "قلب": ["د. أحمد مسعد الغلبان (6م)"], "أنف وأذن": ["د. محمد هيكل (7م)"], "أسنان": ["د. محمد علاء (3م)", "د. محمود دهب (8م)"], "رمد": ["د. خالد أحمد الشيخ (5ع)"], "مسالك": ["د. علي منتصر (7م)"], "عظام": ["إبراهيم مطاوع (4ع)"] },
    "الإثنين": { "نساء وتوليد": ["د. هيام السمراوي (1ظ)"], "مخ وأعصاب": ["د. محمد سلام (8م)"], "أسنان": ["د. رنا حمودة (4م)", "د. خالد الداهس (9م)"], "مسالك": ["د. علي منتصر (7م)"] },
    "الثلاثاء": { "أنف وأذن": ["د. سناء الحماقي (4م)"], "نفسية وعصبية": ["د. آلاء الحوت (6م)"], "أسنان": ["د. محمد علاء (3م)", "د. محمود دهب (8م)"], "مسالك": ["د. علي منتصر (7م)"], "عظام": ["إبراهيم مطاوع (4ع)"], "رمد": ["محمد مجدي سعده (2ظ)"] },
    "الأربعاء": { "أسنان": ["د. رنا حمودة (4م)", "د. خالد الداهس (9م)"], "قلب": ["د. أحمد مسعد الغلبان (6م)"], "مسالك": ["د. علي منتصر (7م)"], "أطفال": ["د. جينا الشافعي (6م)"] },
    "الخميس": { "قلب": ["د. أحمد مسعد الغلبان (6م)"], "أنف وأذن": ["د. محمد هيكل (7م)"], "أسنان": ["د. محمد علاء (3م)", "د. محمود دهب (8م)"], "مسالك": ["د. علي منتصر (7م)"] },
    "الجمعة": { "باطنة ومناظير": ["د. عزيز بدير (2ظ)"] }
};

function updateSpecialties() {
    const day = document.getElementById('bDay').value;
    const specSelect = document.getElementById('specialty');
    specSelect.innerHTML = '<option value="">اختر العيادة...</option>';
    if(day) {
        Object.keys(constantServices).forEach(s => specSelect.add(new Option(s, s)));
        if(scheduleData[day]) {
            Object.keys(scheduleData[day]).forEach(s => specSelect.add(new Option(s, s)));
        }
    }
}

function updateDoctors() {
    const day = document.getElementById('bDay').value;
    const spec = document.getElementById('specialty').value;
    const docSelect = document.getElementById('doctorName');
    docSelect.innerHTML = '<option value="">اختر الطبيب...</option>';
    if(constantServices[spec]) {
        constantServices[spec].forEach(d => docSelect.add(new Option(d, d)));
    } else if(scheduleData[day] && scheduleData[day][spec]) {
        scheduleData[day][spec].forEach(d => docSelect.add(new Option(d, d)));
    }
}

// دالة جديدة: توليد رقم الحجز وتصفيره يومياً بعد 12 ليلاً
function getDailyCounter() {
    const now = new Date();
    // الحصول على تاريخ اليوم بتنسيق محلي
    const todayStr = now.toLocaleDateString();
    
    let storedDate = localStorage.getItem('bookingDate');
    let counter = parseInt(localStorage.getItem('dailyBookingCounter')) || 0;

    // إذا كان التاريخ المخزن يختلف عن تاريخ اليوم (دخلنا يوم جديد)
    if (storedDate !== todayStr) {
        counter = 1; // تصفير العداد وبدء من 1
        localStorage.setItem('bookingDate', todayStr);
    } else {
        counter++; // زيادة العداد إذا كنا في نفس اليوم
    }

    localStorage.setItem('dailyBookingCounter', counter);
    return counter;
}

const scriptURL = 'https://script.google.com/macros/s/AKfycbwzVo2w7Jjzjo5icuSgXV4fj6BJGu2gdcVSZBHcss6heWriEXtGt7AMoFJTpnYrfvdC-w/exec';
const form = document.getElementById('booking-form');

form.addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('btn').style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(res => res.text())
    .then(id => {
        document.getElementById('loader').style.display = 'none';
        form.style.display = 'none';
        document.getElementById('res-name').innerText = document.getElementById('pName').value;
        document.getElementById('res-day').innerText = document.getElementById('bDay').value;
        document.getElementById('res-doc').innerText = document.getElementById('doctorName').value;
        
        // استخدام الدالة الجديدة للحصول على رقم الحجز اليومي
        const dailyBookingNumber = getDailyCounter();
        document.getElementById('b-num').innerText = dailyBookingNumber;
        
        document.getElementById('success-msg').style.display = 'block';
    })
    .catch(err => { alert('خطأ في الاتصال'); document.getElementById('btn').style.display = 'block'; document.getElementById('loader').style.display = 'none'; });
});
</script>
