        }

    window.updateSpecialties = function() {
        const day = document.getElementById('bDay').value;
        const specSelect = document.getElementById('specialty');
        specSelect.innerHTML = '<option value="">اختر العيادة...</option>';
        if(day) {
            Object.keys(constantServices).forEach(s => specSelect.add(new Option(s, s)));
            if(scheduleData[day]) Object.keys(scheduleData[day]).forEach(s => specSelect.add(new Option(s, s)));
        }
    }

    window.updateDoctors = function() {
        const day = document.getElementById('bDay').value;
        const spec = document.getElementById('specialty').value;
        const docSelect = document.getElementById('doctorName');
        docSelect.innerHTML = '<option value="">اختر الطبيب والموعد...</option>';
        let list = constantServices[spec] || (scheduleData[day] ? scheduleData[day][spec] : null);
        if(list) list.forEach(d => docSelect.add(new Option(d, d)));
    }

    const form = document.getElementById('booking-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('btn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        const pName = document.getElementById('pName').value;
        const bDay = document.getElementById('bDay').value;
        const specialty = document.getElementById('specialty').value;
        const doctor = document.getElementById('doctorName').value;

        try {
            const q = query(collection(db, "bookings"));
            const querySnapshot = await getDocs(q);
            const count = querySnapshot.size + 1;

            await addDoc(collection(db, "bookings"), {
                patientName: pName,
                bookingDay: bDay,
                specialty: specialty,
                doctorName: doctor,
                orderNumber: count,
                timestamp: serverTimestamp()
            });

            document.getElementById('loader').style.display = 'none';
            form.style.display = 'none';
            document.getElementById('b-num').innerText = count;
            document.getElementById('success-msg').style.display = 'block';

            const msg = `*حجز جديد*📝%0A*المريض:* ${pName}%0A*اليوم:* ${bDay}%0A*العيادة:* ${specialty}%0A*الدكتور:* ${doctor}%0A*رقم الدور:* ${count}`;
            setTimeout(() => { window.location.href = `https://wa.me/201122501159?text=${msg}`; }, 1000);

        } catch (error) {
            console.error(error);
            alert('حدث خطأ! يرجى المحاولة مرة أخرى.');
            document.getElementById('btn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    });
