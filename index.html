<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجوزات مجمع شبراملس الطبي</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#0097a7;
    --accent:#00bcd4;
    --bg:linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

body {
    font-family:'Tajawal';
    margin:0;
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container {
    background:#fff;
    padding:35px;
    border-radius:25px;
    width:100%;
    max-width:500px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    text-align:center;
    border-top:6px solid var(--primary);
}

h2 { color:var(--primary); margin-bottom:20px; }

.form-group {
    text-align:right;
    margin-bottom:20px;
}

label {
    font-weight:700;
    margin-bottom:8px;
    display:block;
    color:var(--primary);
}

input,select {
    width:100%;
    padding:14px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
    transition:.3s;
}

input:focus,select:focus {
    border-color:var(--accent);
    outline:none;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

.submit-btn {
    background:linear-gradient(45deg,var(--primary),var(--accent));
    color:#fff;
}

.submit-btn:hover {
    opacity:.9;
}

.cancel-btn {
    background:#eee;
    color:#d32f2f;
}

#success {
    display:none;
}

.logo {
    width:120px;
    border-radius:50%;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">
<img src="logo.png" class="logo">

<h2>حجز موعد</h2>

<form id="form">

<div class="form-group">
<label>اسم المريض</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>اليوم</label>
<select id="day" onchange="updateSpec()" required>
<option value="">اختر اليوم</option>
<option>السبت</option>
<option>الأحد</option>
<option>الإثنين</option>
<option>الثلاثاء</option>
<option>الأربعاء</option>
<option>الخميس</option>
<option>الجمعة</option>
</select>
</div>

<div class="form-group">
<label>العيادة</label>
<select id="spec" onchange="updateDoc()" required>
<option value="">اختر اليوم أولاً</option>
</select>
</div>

<div class="form-group">
<label>الطبيب</label>
<select id="doc" required>
<option value="">اختر العيادة أولاً</option>
</select>
</div>

<button class="submit-btn">تأكيد الحجز</button>
<button type="button" class="cancel-btn" onclick="location.reload()">إلغاء</button>

</form>

<div id="success">
<h3>✅ تم الحجز</h3>
<p id="result"></p>
<button onclick="location.reload()">حجز جديد</button>
</div>

</div>

<script>

const data = {
"السبت":{"أسنان":["د. رنا","د. خالد"],"مسالك":["د. علي"]},
"الأحد":{"قلب":["د. أحمد"],"أسنان":["د. محمد"]},
"الإثنين":{"نساء":["د. هيام"],"مخ وأعصاب":["د. سلام"]},
"الثلاثاء":{"نفسية":["د. آلاء"]},
"الأربعاء":{"أطفال":["د. جينا"]},
"الخميس":{"عظام":["د. إبراهيم"]},
"الجمعة":{"باطنة":["د. عزيز"]}
};

function updateSpec(){
let day=document.getElementById("day").value;
let spec=document.getElementById("spec");
let doc=document.getElementById("doc");

spec.innerHTML='<option>اختر العيادة</option>';
doc.innerHTML='<option>اختر الطبيب</option>';

if(data[day]){
Object.keys(data[day]).forEach(s=>{
let o=document.createElement("option");
o.text=s;
spec.add(o);
});
}
}

function updateDoc(){
let day=document.getElementById("day").value;
let spec=document.getElementById("spec").value;
let doc=document.getElementById("doc");

doc.innerHTML='<option>اختر الطبيب</option>';

data[day][spec].forEach(d=>{
let o=document.createElement("option");
o.text=d;
doc.add(o);
});
}

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

let name=document.getElementById("name").value;
let day=document.getElementById("day").value;
let spec=document.getElementById("spec").value;
let doc=document.getElementById("doc").value;

if(!day||!spec||!doc){
alert("اكمل البيانات");
return;
}

document.getElementById("form").style.display="none";
document.getElementById("success").style.display="block";
document.getElementById("result").innerText=
name+" - "+day+" - "+spec+" - "+doc;
});

</script>

</body>
</html>
