<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجمع شبراملس الطبي - حجز موعد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00bcd4; /* لبني مشرق */
            --primary-dark: #0097a7;
            --bg-gradient: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            --card-bg: #ffffff;
            --text-main: #0a2529; /* كحلي داكن جداً للوضوح */
            --text-muted: #264653;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: var(--shadow);
            object-fit: cover;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .main-logo:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0f2f1;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            background-color: #f9fdfd;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4);
        }

        #bookingResult {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background: #e0f2f1;
            border: 2px dashed var(--primary-color);
            text-align: center;
            display: none;
        }

        .booking-id {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-dark);
            margin: 10px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="مجمع شبراملس الطبي" class="main-logo">
        <h1>مجمع شبراملس الطبي</h1>
    </div>

    <div class="container">
        <form id="bookingForm" autocomplete="off">
            <div class="form-group">
                <label>اسم المريض الثلاثي</label>
                <input type="text" name="patientName" placeholder="أدخل الاسم بالكامل" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label>التخصص المطلوب</label>
                <select name="specialty" required>
                    <option value="">اختر التخصص</option>
                    <option value="باطنة">باطنة</option>
                    <option value="أطفال">أطفال</option>
                    <option value="أسنان">أسنان</option>
                    <option value="عظام">عظام</option>
                    <option value="رمد">رمد</option>
                </select>
            </div>

            <div class="form-group">
                <label>اسم الطبيب</label>
                <input type="text" name="doctorName" placeholder="اختياري" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">تأكيد الحجز الآن</button>
        </form>

        <div id="bookingResult">
            <p style="font-weight: 700;">تم تأكيد حجزك بنجاح!</p>
            <p>رقم الحجز الخاص بك هو:</p>
            <div class="booking-id" id="bookingNumber">--</div>
            
            <p style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">
                يرجى تصوير الشاشة وإظهارها للاستقبال عند الحضور للمجمع.
            </p>

            <p style="font-size: 20px; color: #d32f2f; font-weight: 800; border-top: 2px solid #ffcdd2; padding-top: 10px; margin-top: 10px;">
                ⚠️ سيتم إلغاء الحجز عند انتهاء وقت العيادة
            </p>
        </div>
    </div>

    <div class="footer">
        نظام الحجز الذكي - مجمع شبراملس الطبي 2026
    </div>

    <script>
        // ضع الرابط الأزرق الذي نسخته من جوجل هنا
        const scriptURL = 'ضع_رابط_جوجل_هنا';
        const form = document.getElementById('bookingForm');
        const btn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('bookingResult');
        const numberSpan = document.getElementById('bookingNumber');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = 'جاري الحجز...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => response.text())
                .then(data => {
                    btn.style.display = 'none';
                    form.style.display = 'none';
                    resultDiv.style.display = 'block';
                    numberSpan.innerText = data;
                })
                .catch(error => {
                    alert('عذراً، حدث خطأ! حاول مرة أخرى');
                    btn.disabled = false;
                    btn.innerText = 'تأكيد الحجز الآن';
                });
        });
    </script>
</body>
</html>
